version: 1
frontend:
  phases:
    preBuild:
      commands:
        # We are already in the frontend folder (confirmed by previous build logs)
        - nvm use 20
        - npm ci
    build:
      commands:
        - nvm use 20
        - npm run build
  artifacts:
    # Target the .next directory directly
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*