version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - npm ci
        build:
          commands:
            - nvm use 20
            - npm run build
            - mkdir -p .amplify-hosting/compute/default
            - mkdir -p .amplify-hosting/static
            - cp -r .next .amplify-hosting/compute/default/.next
            - cp -r public/* .amplify-hosting/static/ || true
            - cp package.json .amplify-hosting/compute/default/
            - cp -r node_modules .amplify-hosting/compute/default/node_modules
            - echo '{\"version\":1,\"routes\":[{\"path\":\"/api/<*>\",\"target\":{\"kind\":\"Compute\",\"src\":\"default\"}},{\"path\":\"/_next/image\",\"target\":{\"kind\":\"Compute\",\"src\":\"default\"}},{\"path\":\"/_next/static/<*>\",\"target\":{\"kind\":\"Static\"}},{\"path\":\"/static/<*>\",\"target\":{\"kind\":\"Static\"}},{\"path\":\"/<*>\",\"target\":{\"kind\":\"Compute\",\"src\":\"default\"}}],\"computeResources\":[{\"name\":\"default\",\"runtime\":\"nodejs18.x\",\"entrypoint\":\".next/standalone/server.js\"}],\"framework\":{\"name\":\"next\",\"version\":\"14.2.35\"}}' > .amplify-hosting/deploy-manifest.json
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*"