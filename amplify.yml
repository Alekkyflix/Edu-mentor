version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci
    build:
      commands:
        - nvm use 20
        - npm run build
  artifacts:
    # Set to current directory to include the manually created deploy-manifest.json
    baseDirectory: .
    files:
      - '.next/**/*'
      - 'deploy-manifest.json'
      - 'next.config.js'
      - 'package.json'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*