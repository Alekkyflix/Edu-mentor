version: 1
# ─────────────────────────────────────────────────────────────────────────────
# Monorepo Configuration (Forces Amplify to find Next.js in the subfolder)
# ─────────────────────────────────────────────────────────────────────────────
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - echo "==> Building in Monorepo mode"
            - npm ci --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        # Since appRoot is 'frontend', we only need to point to '.next'
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    
    # Optional: Keep your custom headers here
    customHeaders:
      - pattern: "**/*"
        headers:
          - key: "Strict-Transport-Security"
            value: "max-age=31536000; includeSubDomains"
          - key: "X-Content-Type-Options"
            value: "nosniff"
          - key: "X-Frame-Options"
            value: "DENY"