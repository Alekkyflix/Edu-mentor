version: 1

# ─────────────────────────────────────────────────────────────────────────────
# EduMentor AI — AWS Amplify Build Specification
# ─────────────────────────────────────────────────────────────────────────────
#
# Architecture:
#   Frontend  →  Next.js 14 (SSR)  →  AWS Amplify Hosting (this file)
#   Backend   →  FastAPI (Python)  →  AWS App Runner / ECS / Lambda (separate)
#
# Required Amplify Environment Variables (set in Amplify Console → Environment):
#   NEXT_PUBLIC_API_URL       — Public URL of your deployed FastAPI backend
#                               e.g. https://api.edumentor.example.com
#   NEXT_PUBLIC_APP_ENV       — "production" | "staging" | "development"
#   SENTRY_DSN                — (optional) Sentry DSN for frontend error tracking
#   SENTRY_AUTH_TOKEN         — (optional) Sentry auth token for source maps
#   NEXT_PUBLIC_SENTRY_DSN    — (optional) Client-side Sentry DSN
#
# Node version is pinned via .nvmrc or the nvm install step below.
# ─────────────────────────────────────────────────────────────────────────────

frontend:
  phases:
    preBuild:
      commands:
        # ── Runtime setup ──────────────────────────────────────────────────
        - echo "==> Node / npm versions"
        - node --version
        - npm --version

        # Use Node 20 LTS (required for Next.js 14)
        - nvm install 20
        - nvm use 20
        - node --version

        # ── Install frontend dependencies ──────────────────────────────────
        - echo "==> Installing frontend dependencies"
        - cd frontend
        - npm ci --prefer-offline

    build:
      commands:
        - echo "==> Building Next.js frontend"
        - cd frontend

        # Inject runtime env vars so Next.js picks them up at build time
        - echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> .env.production
        - echo "NEXT_PUBLIC_APP_ENV=$NEXT_PUBLIC_APP_ENV" >> .env.production

        # Optional: inject Sentry env vars if provided
        - |
          if [ -n "$NEXT_PUBLIC_SENTRY_DSN" ]; then
            echo "NEXT_PUBLIC_SENTRY_DSN=$NEXT_PUBLIC_SENTRY_DSN" >> .env.production
            echo "SENTRY_DSN=$SENTRY_DSN" >> .env.production
          fi

        - npm run build

    postBuild:
      commands:
        - echo "==> Build complete ✅"
        - ls -la frontend/.next/

  artifacts:
    # For Next.js SSR on Amplify Hosting (compute tier)
    # Amplify will serve the .next standalone output
    baseDirectory: frontend
    files:
      - "**/*"

  cache:
    paths:
      # Cache node_modules and Next.js build cache between deploys
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/*

# ─────────────────────────────────────────────────────────────────────────────
# Custom rewrite & redirect rules
# (These can also be set in the Amplify Console → Rewrites and Redirects)
# ─────────────────────────────────────────────────────────────────────────────
customHeaders:
  - pattern: "**/*"
    headers:
      # Security headers
      - key: "Strict-Transport-Security"
        value: "max-age=31536000; includeSubDomains"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-XSS-Protection"
        value: "1; mode=block"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
      - key: "Permissions-Policy"
        value: "camera=(), microphone=(), geolocation=()"

  - pattern: "/static/**"
    headers:
      # Long-lived cache for hashed static assets
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"

  - pattern: "/_next/static/**"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
